name: Build and Deploy Docs

on:
  push:
    branches:
      - main
      - docs
  workflow_dispatch: # permette di eseguire manualmente

jobs:
  build_docs:
    runs-on: ubuntu-latest
    steps:
      # Repo checkout
      - name: Clone repo
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==2.3.2

      - name: Install dependencies
        run: poetry install --with dev

      - name: Build HTML docs
        run: |
          poetry run sphinx-build -b html docs/source docs/build/html

      - name: Install LaTeX
        run: sudo apt-get update && sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra latexmk make
      - name: Build PDF docs
        run: |
          poetry run sphinx-build -b latex docs/source docs/build/latex
          cd docs/build/latex && make
          cp *.pdf ../../medunda_user_guide.pdf

      - name: Deploy HTML to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/html

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: latest
          release_name: Latest Docs
          draft: false
          prerelease: false
          body: "Ultima versione della documentazione PDF"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDF to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./medunda_user_guide.pdf
          asset_name: medunda_user_guide.pdf
          asset_content_type: application/pdf
